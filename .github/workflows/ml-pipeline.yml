name: ML Pipeline

on:
  workflow_dispatch:  
  push:
    branches: [ deployment-visualisasi ] 
env:
  AZURE_WEBAPP_NAME: electricity-forecasting-market

jobs:
  ml-lifecycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
           python-version: '3.11'
           
      - name: Install dependencies
        run: |
          pip install -r requirement.txt
          pip install jupyter

      - name: Data Ingestion Fingrid & FMI
        run: |
          python importingDataFinGrid.py
          python importingDataFMI.py

      - name: Data Preprocessing
        run: |
          jupyter nbconvert --to notebook --execute preprocessing.ipynb
          
      - name: Train and Evaluate ML Model
        run: |
          python modelling.py

          
      - name: Prepare Deployment Package
        run: |

          mkdir -p ./publish

          mkdir -p ./publish/model    # Untuk file model ML
          mkdir -p ./publish/static   # Untuk gambar plot dan aset statis lainnya
          mkdir -p ./publish/templates # Untuk file HTML template

          cp app.py ./publish/

          cp requirement.txt ./publish/

          cp model/ThetaModel_champion.joblib ./publish/model/
          cp model/model_champion.joblib ./publish/model/
          cp model/champion_config.json ./publish/model/
          cp model/champion_score.txt ./publish/model/
          cp model/training.log ./publish/model/

          cp plots/sarima_test_forecast.png ./publish/static/forecast_plot.png

          cp -r templates/ ./publish/
    
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [ml-lifecycle]

    steps:
        - uses: actions/checkout@v4

        - name: Download artifact
          uses: actions/download-artifact@v4
          with:
            name: webapp-package 
            path: ./downloaded-package

        - name: Deploy to Azure Web App
          uses: azure/webapps-deploy@v2
          with:
            app-name: ${{ env.AZURE_WEBAPP_NAME }}
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
            package: ./downloaded-package
      
      
